    # ══════════════════════════════════════
    # FamilyWell API
    # ══════════════════════════════════════

    # ── 流式端点（SSE）：关闭所有缓冲 ──
    location /familywell/api/chat/stream {
        proxy_pass http://127.0.0.1:8004/api/chat/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;

        # SSE 必须：关闭缓冲，逐块透传
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── 其他所有 API ──
    location /familywell/api/ {
        proxy_pass http://127.0.0.1:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # ── 健康检查（可选） ──
    location = /familywell/health {
        proxy_pass http://127.0.0.1:8004/health;
    }
