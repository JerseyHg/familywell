version: "3.8"

services:
  api:
    build: .
    container_name: familywell-api
    restart: always
    ports:
      - "127.0.0.1:8004:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
    networks:
      - shared-net       # 连 shared-postgres
      - familywell       # 内部连 redis

volumes:
  redis_data:

networks:
  shared-net:
    external: true       # 复用已有的 shared-net
  familywell:
    driver: bridge
