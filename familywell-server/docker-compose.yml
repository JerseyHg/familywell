version: "3.8"

services:
  api:
    build: .
    container_name: familywell-api
    restart: always
    ports:
      - "127.0.0.1:8004:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    networks:
      - shared-net       # 连 shared-postgres
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  shared-net:
    external: true       # 复用已有的 shared-net
